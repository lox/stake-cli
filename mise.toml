[tools]
go = "1.25.1"
"github:golangci/golangci-lint" = "v2.11.4"
svu = "3.3.0"

[tasks.build]
description = "Build the stake-cli binary"
run = [
  "mkdir -p dist",
  "go build -o dist/stake-cli ./cmd/stake-cli",
]

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.check]
description = "Run all checks (build, test, lint)"
depends = ["build", "test", "lint"]

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.release]
description = "Tag the next version and push to trigger a release"
depends = ["check"]
run = """
NEXT=$(svu next)
CURRENT=$(svu current)
if [ "$NEXT" = "$CURRENT" ]; then
  echo "No version bump detected (current: $CURRENT). Use conventional commits (feat:, fix:, etc.)."
  exit 1
fi
echo "Releasing $CURRENT -> $NEXT"
git tag "$NEXT"
git push origin "$NEXT"
echo "Tagged and pushed $NEXT - release workflow will run on GitHub."
"""

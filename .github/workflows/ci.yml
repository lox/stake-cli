name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v ./...

      - name: Lint
        run: golangci-lint run
